{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Editar mi Información</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <h5 class="text-muted border-bottom pb-2">Datos de Usuario</h5>
                        {{ u_form.as_p }}
                        
                        <h5 class="text-muted border-bottom pb-2 mt-4">Foto de Perfil</h5>
                        {{ p_form.as_p }}
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success">Guardar Cambios</button>
                            <a href="{% url 'perfil' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
