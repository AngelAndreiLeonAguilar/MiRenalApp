{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center card p-5 shadow-sm border-0">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            </div>
            <h2 class="fw-bold text-primary">Contraseña Actualizada</h2>
            <p class="text-muted mt-3">
                Tu contraseña ha sido cambiada con éxito. Ahora ya puedes iniciar sesión con tu nueva clave.
            </p>
            <div class="d-grid gap-2 mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Iniciar Sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
