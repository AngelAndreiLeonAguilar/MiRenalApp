{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-blue text-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-person-circle me-2"></i>Mi Perfil</h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="bg-light d-inline-block rounded-circle p-4 mb-3">
                            <i class="bi bi-person text-blue" style="font-size: 4rem;"></i>
                        </div>
                        <h3 class="fw-bold">{{ user.username }}</h3>
                        <span class="badge bg-primary px-3">Paciente</span>
                    </div>

                    <hr>

                    <div class="row mt-4">
                        <div class="col-sm-6 mb-3">
                            <label class="text-muted small uppercase fw-bold">Nombre de usuario</label>
                            <p class="fs-5">{{ user.username }}</p>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <label class="text-muted small uppercase fw-bold">Correo electrónico</label>
                            <p class="fs-5">{{ user.email|default:"No registrado" }}</p>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <label class="text-muted small uppercase fw-bold">Fecha de unión</label>
                            <p class="fs-5">{{ user.date_joined|date:"d F Y" }}</p>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <a href="#" class="btn btn-outline-primary">
                            <i class="bi bi-pencil-square me-2"></i>Editar Información
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
