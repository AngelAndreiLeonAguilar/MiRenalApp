<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - MiRenalApp</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <!-- Navbar igual que en home -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-purple">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">MiRenalApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Profesionales</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Herramientas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenedor centrado -->
    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg border-0 rounded" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4">
                <h2 class="text-center text-purple mb-4">Iniciar sesión</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label text-purple">Usuario</label>
                        <input type="text" name="username" id="id_username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label text-purple">Contraseña</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-purple w-100">Entrar</button>
                </form>
                <p class="mt-3 text-center">
                    ¿No tienes cuenta?  
                    <a href="{% url 'registro' %}" class="fw-bold" style="color:#ffffff;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Footer igual que en home -->
    <footer class="bg-purple text-white text-center p-3 mt-5">
        <p>© 2025 MiRenalApp – Página de ejemplo</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
