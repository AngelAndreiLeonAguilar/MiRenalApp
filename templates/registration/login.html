<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - Kidnely Health</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <!-- Navbar igual que en referencia -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold text-blue" href="{% url 'home' %}">Kidnely Health</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link text-blue" href="#">Pacientes y familias</a></li>
                    <li class="nav-item"><a class="nav-link text-blue" href="#">Profesionales de la salud</a></li>
                    <li class="nav-item"><a class="nav-link text-blue" href="#">Medios</a></li>
                    <li class="nav-item"><a class="nav-link text-blue" href="{% url 'quienes_somos' %}">Quiénes somos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenedor centrado -->
    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg border-0 rounded" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4">
                <h2 class="text-center text-blue mb-4">Iniciar sesión</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label text-blue">Usuario</label>
                        <input type="text" name="username" id="id_username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label text-blue">Contraseña</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-blue w-100 fw-bold">Ingresar</button>
                </form>
                <p class="mt-3 text-center">
                    ¿No tienes cuenta?  
                    <a href="{% url 'registro' %}" class="fw-bold text-blue">Regístrate aquí</a>
                </p>
                <p class="text-center small">
                    ¿Olvidaste tu contraseña?  
                    <a href="#" class="fw-bold text-blue">Recupérala</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-blue text-white text-center p-3 mt-5">
        <p>© 2026 Kidnely Health – Todos los derechos reservados</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
