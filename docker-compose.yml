services:
  web:
    build: .
    container_name: django_app
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    networks:
      - db_network
      - nginx-proxy-network
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    # Ahora el servicio db lee las variables directamente del archivo .env
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/var/www/html/static
    depends_on:
      - web
    networks:
      - nginx-proxy-network
    restart: always

volumes:
  postgres_data:
  static_volume:

networks:
  nginx-proxy-network:
    external: true
  db_network:
    internal: true