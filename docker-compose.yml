version: '3.8'

services:
  web:
    build: .
    container_name: django_app
    env_file:
      - .env
    # Mapeo temporal de puertos exclusivo para probar en tu laptop
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - db_network
      - nginx-proxy-network
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db_network
    restart: always

volumes:
  postgres_data:

networks:
  nginx-proxy-network:
    external: true
  db_network:
    internal: true